<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Birthday Aditi 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Sacramento&display=swap" rel="stylesheet">

<style>

/* ════════════════════════════════════════
   BASE
════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; }

:root {
  --teal-deep:  #1e6a7a;
  --teal-mid:   #3a9ab0;
  --teal-base:  #5aafc0;
  --teal-light: #a8d9e4;
  --teal-pale:  #dff3f7;
  --gold:       #d4a96a;
  --gold-light: #f2ddb0;
  --cream:      #f7feff;
}

body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #4ca1af, #c4e0e5);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}


/* ════════════════════════════════════════
   COUNTDOWN INTRO SCREEN
════════════════════════════════════════ */
#countdown-screen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  background:
    radial-gradient(ellipse at 60% 80%,  #1e6a7a 0%,  transparent 55%),
    radial-gradient(ellipse at 15% 20%,  #a8d9e4 0%,  transparent 45%),
    radial-gradient(ellipse at 85% 10%,  #3a9ab0 0%,  transparent 40%),
    radial-gradient(ellipse at 50% 50%,  #5aafc0 0%,  #2d8095 100%);
  transition: opacity 1s ease, transform 1s ease;
}
#countdown-screen.fade-out {
  opacity: 0;
  transform: scale(1.07);
  pointer-events: none;
}

/* Shimmer orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(242,221,176,0.45), transparent 70%);
  animation: orbPulse var(--d, 4s) ease-in-out infinite;
  pointer-events: none;
}
@keyframes orbPulse {
  0%,100% { transform: scale(0.8); opacity: 0.3; }
  50%      { transform: scale(1.2); opacity: 0.7; }
}

/* Glitter dots */
.glitter {
  position: absolute;
  border-radius: 50%;
  background: var(--gold-light);
  pointer-events: none;
  animation: glitterFloat var(--gd, 3s) ease-in-out infinite;
  opacity: 0;
}
@keyframes glitterFloat {
  0%,100% { opacity: 0;    transform: translateY(0)     scale(0.6); }
  50%      { opacity: 0.85; transform: translateY(-14px) scale(1.1); }
}

/* Balloon */
#balloon-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: balloonBob 2.6s ease-in-out infinite;
  position: relative;
  z-index: 2;
}
@keyframes balloonBob {
  0%,100% { transform: translateY(0px)   rotate(-2.5deg); }
  50%      { transform: translateY(-24px) rotate(2.5deg);  }
}
#balloon-wrap.popping {
  animation: balloonPop 0.45s ease-out forwards;
}
@keyframes balloonPop {
  0%   { transform: scale(1);    opacity: 1; }
  40%  { transform: scale(1.6);  opacity: 0.8; }
  100% { transform: scale(0.03); opacity: 0; }
}
#balloon-svg {
  width: clamp(120px, 36vw, 165px);
  height: auto;
  filter: drop-shadow(0 12px 32px rgba(30,106,122,0.45))
          drop-shadow(0  4px 12px rgba(212,169,106,0.3));
}
#balloon-string {
  width: 2px;
  height: clamp(65px, 17vw, 95px);
  background: linear-gradient(to bottom, var(--gold), transparent);
  border-radius: 1px;
  margin-top: -4px;
  opacity: 0.65;
}

/* Countdown number */
#countdown-number {
  font-family: 'Playfair Display', 'Georgia', serif;
  font-size: clamp(115px, 31vw, 180px);
  font-weight: 700;
  color: var(--cream);
  text-shadow:
    0 0  30px rgba(168,217,228,0.7),
    0 4px 24px rgba(30,106,122,0.5),
    0 0  70px rgba(212,169,106,0.25);
  line-height: 1;
  margin-top: clamp(18px, 5vw, 28px);
  letter-spacing: -4px;
  position: relative;
  z-index: 2;
  transition: opacity 0.3s ease;
}
#countdown-number.pop-in {
  animation: numPopIn 0.44s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
@keyframes numPopIn {
  0%   { transform: scale(0.3);  opacity: 0.1; }
  68%  { transform: scale(1.16); }
  100% { transform: scale(1);    opacity: 1;   }
}

/* Label */
#countdown-label {
  font-family: 'Sacramento', cursive;
  font-size: clamp(20px, 5.5vw, 32px);
  color: var(--gold-light);
  margin-top: clamp(10px, 3.5vw, 18px);
  letter-spacing: 0.8px;
  text-align: center;
  padding: 0 28px;
  text-shadow: 0 2px 14px rgba(30,106,122,0.5);
  position: relative;
  z-index: 2;
  transition: opacity 0.3s ease;
}

/* Firework particles */
.pop-particle {
  position: fixed;
  pointer-events: none;
  z-index: 10000;
  animation: particleShoot var(--dur) var(--ease, ease-out) forwards;
}
@keyframes particleShoot {
  0%   { transform: translate(0,0)                      scale(1);   opacity: 1;          }
  70%  { transform: translate(var(--tx70),var(--ty70))  scale(0.8); opacity: var(--op70);}
  100% { transform: translate(var(--tx),var(--ty))      scale(0.1); opacity: 0;          }
}
.star-particle {
  position: fixed;
  pointer-events: none;
  z-index: 10000;
  width: 0; height: 0;
  animation: starShoot var(--dur) ease-out forwards;
}
.star-particle::before {
  content: '✦';
  font-size: var(--fs, 14px);
  color: var(--col, #f2ddb0);
  position: absolute;
  transform: translate(-50%,-50%);
  text-shadow: 0 0 6px var(--col, #f2ddb0);
}
@keyframes starShoot {
  0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx),var(--ty)) rotate(var(--rot)) scale(0.2); opacity: 0; }
}
.streak-particle {
  position: fixed;
  pointer-events: none;
  z-index: 10000;
  height: 2px;
  border-radius: 2px;
  transform-origin: left center;
  animation: streakShoot var(--dur) ease-out forwards;
}
@keyframes streakShoot {
  0%   { transform: translate(0,0) rotate(var(--ang)) scaleX(1);   opacity: 0.9; }
  60%  { opacity: 0.5; }
  100% { transform: translate(var(--tx),var(--ty)) rotate(var(--ang)) scaleX(0.3); opacity: 0; }
}


/* ════════════════════════════════════════
   MAIN BIRTHDAY CARD
════════════════════════════════════════ */
#main-content {
  display: none;
  width: 100%;
  max-width: 420px;
  padding: 0 16px;
  animation: mainReveal 0.9s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes mainReveal {
  from { opacity: 0; transform: translateY(30px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0)    scale(1);    }
}

.card {
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  text-align: center;
  position: relative;
  width: 100%;
}
.card img {
  width: 100%;
  display: block;
}

.btn {
  position: absolute;
  top: 62%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 14px 24px;
  font-size: 22px;
  font-weight: bold;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  color: #ffffff;
  background-color: #043c2f;
  box-shadow: 0 6px 16px rgba(0,0,0,0.3);
  transition: 0.3s;
  min-width: 56px;
  min-height: 56px;
}
.btn:hover  { transform: translate(-50%, -50%) scale(1.05); }
.btn:active { transform: translate(-50%, -50%) scale(0.97); }

.overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
  z-index: 500;
}
.overlay.show {
  opacity: 1;
  pointer-events: all;
}
.message {
  background: rgb(246,249,249);
  padding: 25px;
  border-radius: 25px;
  width: 100%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 8px 20px rgba(7,187,196,0.993);
  transform: translateY(20px);
  opacity: 0;
  transition: all 0.6s ease;
}
.overlay.show .message {
  transform: translateY(0);
  opacity: 1;
}
.highlight {
  font-size: 30px;
  font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
  font-weight: bold;
  color: #d70e0e;
  margin-bottom: 10px;
}
.text {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.5;
  color: #341818;
  text-align: center;
}
.popup-img {
  width: 100%;
  max-width: 350px;
  height: auto;
  aspect-ratio: 7/8;
  object-fit: cover;
  border-radius: 15px;
  margin-bottom: 15px;
}
.close-btn {
  margin-top: 16px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background-color: #dd85a5;
  color: white;
  font-weight: 200;
  cursor: pointer;
  transition: transform 0.2s;
  font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
  font-size: 16px;
  min-height: 44px;
}
.btn-group {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

.feedback-btn {
  margin-top: 16px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background-color: #25D366; /* WhatsApp green */
  color: white;
  font-weight: 200;
  cursor: pointer;
  transition: transform 0.2s;
  font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
  font-size: 16px;
  min-height: 44px;
}

.feedback-btn:hover {
  transform: scale(1.05);
}

.feedback-btn:active {
  transform: scale(0.97);
}
.close-btn:hover  { transform: scale(1.05); }
.close-btn:active { transform: scale(0.97); }

.hearts {
  position: fixed;
  bottom: -10px;
  width: 100%;
  display: none;
  pointer-events: none;
  z-index: 9999;
}
.heart {
  position: absolute;
  bottom: 0;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
  opacity: 0.7;
}
@keyframes floatUp {
  0%   { transform: translateY(0)      scale(1);   opacity: 0.7; }
  100% { transform: translateY(-100vh) scale(1.5); opacity: 0;   }
}

</style>
</head>

<body>

<script>
    function openWhatsApp() {
  const phoneNumber = "9844539269"; // replace with your number
  const message = "Hey! I want to give feedback about your birthday surprise 🎉";
  
  const url = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
  
  window.open(url, "_blank");
}

/* ════════════════════════════════════════════════════════
   COUNTDOWN + FIREWORK POP
════════════════════════════════════════════════════════ */
(function () {

  const ac = new (window.AudioContext || window.webkitAudioContext)();
  function unlockAudio() { if (ac.state === 'suspended') ac.resume(); }
  document.addEventListener('touchstart', unlockAudio, { once: true });
  document.addEventListener('click',      unlockAudio, { once: true });
  unlockAudio();

  function noise(dur) {
    const len  = Math.ceil(ac.sampleRate * dur);
    const buf  = ac.createBuffer(1, len, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    const src  = ac.createBufferSource();
    src.buffer = buf;
    return src;
  }

  function makeLimiter() {
    const c = ac.createDynamicsCompressor();
    c.threshold.value = -2; c.knee.value = 0;
    c.ratio.value = 20; c.attack.value = 0.0003; c.release.value = 0.12;
    c.connect(ac.destination);
    return c;
  }

  function playTick(pitch) {
    unlockAudio();
    const now = ac.currentTime;
    const osc = ac.createOscillator(), gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine'; osc.frequency.setValueAtTime(pitch, now);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.50, now + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.38);
    osc.start(now); osc.stop(now + 0.40);
  }

  function playFireworkPop() {
    unlockAudio();
    const now = ac.currentTime, lim = makeLimiter();

    function route(src, freq, q, pk, atk, dec, st) {
      const bp = ac.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = freq; bp.Q.value = q;
      const g = ac.createGain();
      g.gain.setValueAtTime(0, now+st);
      g.gain.linearRampToValueAtTime(pk, now+st+atk);
      g.gain.exponentialRampToValueAtTime(0.001, now+st+atk+dec);
      src.connect(bp); bp.connect(g); g.connect(lim);
      return src;
    }

    /* Phase 1: Whistle */
    const w = ac.createOscillator(), wg = ac.createGain();
    w.type = 'sine';
    w.frequency.setValueAtTime(320, now);
    w.frequency.exponentialRampToValueAtTime(2400, now+0.18);
    wg.gain.setValueAtTime(0,now); wg.gain.linearRampToValueAtTime(0.55,now+0.04);
    wg.gain.linearRampToValueAtTime(0.30, now+0.18);
    w.connect(wg); wg.connect(lim); w.start(now); w.stop(now+0.19);

    /* Phase 2: Crack */
    const ck=noise(0.06), chp=ac.createBiquadFilter(), cg=ac.createGain();
    chp.type='highpass'; chp.frequency.value=5000;
    cg.gain.setValueAtTime(2.2,now+0.18); cg.gain.exponentialRampToValueAtTime(0.001,now+0.24);
    ck.connect(chp); chp.connect(cg); cg.connect(lim); ck.start(now+0.18);

    /* Phase 2: Boom */
    const bm=ac.createOscillator(), bg=ac.createGain();
    bm.type='sine'; bm.frequency.setValueAtTime(200,now+0.18);
    bm.frequency.exponentialRampToValueAtTime(35,now+0.52);
    bg.gain.setValueAtTime(0,now+0.18); bg.gain.linearRampToValueAtTime(2.0,now+0.19);
    bg.gain.exponentialRampToValueAtTime(0.001,now+0.60);
    bm.connect(bg); bg.connect(lim); bm.start(now+0.18); bm.stop(now+0.65);

    /* Phase 3–5: Noise layers */
    const body=noise(0.55); route(body,750,0.45,2.8,0.005,0.55,0.18); body.start(now+0.18);
    const mid=noise(0.45);  route(mid,1600,0.7,1.5,0.008,0.44,0.22);  mid.start(now+0.22);
    const sp=noise(0.55);   route(sp,4200,1.1,0.90,0.01,0.55,0.38);   sp.start(now+0.38);
    const sp2=noise(0.45);  route(sp2,6500,1.4,0.60,0.01,0.45,0.58);  sp2.start(now+0.58);
    const tl=noise(0.80);   route(tl,2800,1.8,0.35,0.02,0.80,0.75);   tl.start(now+0.75);

    /* Sub rumble */
    const sb=ac.createOscillator(), sg=ac.createGain();
    sb.type='sine'; sb.frequency.setValueAtTime(55,now+0.55);
    sb.frequency.exponentialRampToValueAtTime(20,now+1.5);
    sg.gain.setValueAtTime(0.5,now+0.55); sg.gain.exponentialRampToValueAtTime(0.001,now+1.6);
    sb.connect(sg); sg.connect(lim); sb.start(now+0.55); sb.stop(now+1.65);
  }

  const pColors = [
    '#5aafc0','#a8d9e4','#2d8095','#1e6a7a',
    '#d4a96a','#f2ddb0','#e8c97a',
    '#ffffff','#dff3f7','#c2eaf2','#7ecfdf','#3ab4cc'
  ];

  function spawnParticles(cx, cy) {
    const mob = window.innerWidth < 520;

    /* Wave 1 */
    const w1 = mob ? 52 : 44;
    for (let i=0;i<w1;i++) {
      const p=document.createElement('div'); p.className='pop-particle';
      const a=(Math.PI*2*i)/w1+(Math.random()-0.5)*0.3, d=80+Math.random()*220, dur=0.7+Math.random()*0.6;
      p.style.cssText=`left:${cx}px;top:${cy}px;width:${7+Math.random()*14}px;height:${7+Math.random()*14}px;
        background:${pColors[i%pColors.length]};border-radius:${Math.random()>0.35?'50%':'4px'};
        --tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;
        --tx70:${Math.cos(a)*d*0.55}px;--ty70:${Math.sin(a)*d*0.55}px;
        --op70:0.8;--dur:${dur}s;--ease:cubic-bezier(0.22,1,0.36,1);`;
      document.body.appendChild(p); setTimeout(()=>p.remove(),dur*1000+100);
    }

    /* Wave 2 */
    setTimeout(()=>{
      const w2=mob?38:30;
      for(let i=0;i<w2;i++){
        const p=document.createElement('div'); p.className='pop-particle';
        const a=(Math.PI*2*i)/w2+Math.random()*0.6, d=130+Math.random()*200, dur=0.8+Math.random()*0.7;
        p.style.cssText=`left:${cx}px;top:${cy}px;width:${5+Math.random()*9}px;height:${5+Math.random()*9}px;
          background:${pColors[Math.floor(Math.random()*pColors.length)]};border-radius:50%;
          --tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;
          --tx70:${Math.cos(a)*d*0.5}px;--ty70:${Math.sin(a)*d*0.5}px;--op70:0.65;--dur:${dur}s;`;
        document.body.appendChild(p); setTimeout(()=>p.remove(),dur*1000+100);
      }
    },160);

    /* Wave 3: stars */
    setTimeout(()=>{
      const sc=mob?22:18;
      for(let i=0;i<sc;i++){
        const s=document.createElement('div'); s.className='star-particle';
        const a=(Math.PI*2*i)/sc+(Math.random()-0.5)*0.5, d=60+Math.random()*260, dur=1.0+Math.random()*0.8;
        s.style.cssText=`left:${cx}px;top:${cy}px;
          --tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;--dur:${dur}s;
          --fs:${10+Math.random()*10}px;--col:${Math.random()>0.5?'#f2ddb0':'#a8d9e4'};
          --rot:${(Math.random()-0.5)*720}deg;`;
        document.body.appendChild(s); setTimeout(()=>s.remove(),dur*1000+100);
      }
    },200);

    /* Wave 4: streaks */
    setTimeout(()=>{
      const stk=mob?20:16;
      for(let i=0;i<stk;i++){
        const sk=document.createElement('div'); sk.className='streak-particle';
        const a=(Math.PI*2*i)/stk, d=80+Math.random()*180, dur=0.6+Math.random()*0.5;
        sk.style.cssText=`left:${cx}px;top:${cy}px;width:${18+Math.random()*30}px;
          background:${Math.random()>0.4?'#d4a96a':'#a8d9e4'};opacity:0.85;
          --tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;--ang:${a*180/Math.PI}deg;--dur:${dur}s;`;
        document.body.appendChild(sk); setTimeout(()=>sk.remove(),dur*1000+100);
      }
    },80);
  }

  /* Countdown */
  const screen=document.getElementById('countdown-screen');
  const numEl=document.getElementById('countdown-number');
  const labelEl=document.getElementById('countdown-label');
  const balloonWrap=document.getElementById('balloon-wrap');
  const pitches={3:480,2:580,1:700};
  let count=3;

  function showNumber(n){
    numEl.textContent=n;
    numEl.classList.remove('pop-in'); void numEl.offsetWidth; numEl.classList.add('pop-in');
  }

  function doPop(){
    const rect=balloonWrap.getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    playFireworkPop();
    spawnParticles(cx,cy);
    balloonWrap.classList.add('popping');
    numEl.style.opacity='0'; labelEl.style.opacity='0';
    setTimeout(()=>{
      screen.classList.add('fade-out');
      setTimeout(()=>{
        screen.style.display='none';
        /* ✅ Reveal birthday card */
        document.getElementById('main-content').style.display='block';
      },1050);
    },500);
  }

  showNumber(3); playTick(pitches[3]);

  const timer=setInterval(()=>{
    count--;
    if(count<=0){
      clearInterval(timer);
      numEl.textContent='🎉';
      numEl.classList.remove('pop-in'); void numEl.offsetWidth; numEl.classList.add('pop-in');
      setTimeout(doPop,520);
    } else {
      showNumber(count); playTick(pitches[count]);
    }
  },1100);

})();


/* ════════════════════════════════════════════════════════
   BIRTHDAY CARD INTERACTIONS
════════════════════════════════════════════════════════ */
function showMessage() {
  document.getElementById('overlay').classList.add('show');
  document.getElementById('bgMusic').play();
  confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
  document.querySelector('.btn').style.display = 'none';
  startHearts();
}

function closeMessage() {
  document.getElementById('overlay').classList.remove('show');
  const music = document.getElementById('bgMusic');
  music.pause(); music.currentTime = 0;
  document.querySelector('.btn').style.display = 'block';
  document.getElementById('hearts').style.display = 'none';
  document.getElementById('hearts').innerHTML = '';
}

function startHearts() {
  const container = document.getElementById('hearts');
  container.style.display = 'block';
  setInterval(() => {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.innerHTML = '🎈';
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.fontSize = (15 + Math.random() * 25) + 'px';
    heart.style.animationDuration = (4 + Math.random() * 3) + 's';
    container.appendChild(heart);
    setTimeout(() => heart.remove(), 7000);
  }, 300);
}

</script>
</body>
